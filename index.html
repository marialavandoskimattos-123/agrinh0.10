<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Forte: Futuro Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <nav>
            <div class="logo">Agro<span>Sustentável</span></div>
            <button id="theme-toggle">🌓 Alternar Tema</button>
        </nav>
    </header>

    <main>
        <section class="hero-plants">
            <div class="glass-card">
                <h1 id="welcome-msg">Agro Forte: O Futuro é Verde</h1>
                <p>O equilíbrio entre a força da produção e a delicadeza do meio ambiente.</p>
                <div class="input-area">
                    <input type="text" id="user-name" placeholder="Seu nome aqui">
                    <button id="btn-action">Explorar Agora</button>
                </div>
            </div>
        </section>

        <section class="info-section">
            <div class="plant-card">
                <h3>Bio-tecnologia</h3>
                <p>Plantas mais resistentes que exigem menos defensivos químicos.</p>
            </div>
            <div class="plant-card">
                <h3>Solo Vivo</h3>
                <p>A cobertura vegetal protege e nutre a terra para as próximas gerações.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
